<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Pomodoro Timer - 番茄钟计时与统计工具"><meta property="og:title" content="Pomodoro Timer"><title>Pomodoro Timer</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column;align-items:center}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;width:100%;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:500px;margin:0 auto;padding:24px;width:100%;text-align:center}.mode-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:24px}.mode-tab{background:#21262d;color:#8b949e;border:1px solid #30363d;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .2s}.mode-tab.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.timer-circle{width:260px;height:260px;border-radius:50%;border:6px solid #30363d;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;position:relative;transition:border-color .3s}.timer-circle.focus{border-color:#58a6ff;box-shadow:0 0 30px rgba(88,166,255,.2)}.timer-circle.break{border-color:#3fb950;box-shadow:0 0 30px rgba(63,185,80,.2)}.timer-circle.longbreak{border-color:#d29922;box-shadow:0 0 30px rgba(210,153,34,.2)}.timer-text{font-size:56px;font-weight:700;font-family:monospace;letter-spacing:2px}.timer-label{font-size:14px;color:#8b949e;margin-top:8px;position:absolute;bottom:50px}.controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}.btn:hover{background:#30363d}.btn-start{background:#238636;border-color:#238636;color:#fff;min-width:120px}.btn-start:hover{background:#2ea043}.btn-pause{background:#d29922;border-color:#d29922;color:#000;min-width:120px}.btn-reset{background:#da3633;border-color:#da3633;color:#fff}.session-counter{font-size:14px;color:#8b949e;margin-bottom:16px}.stats-card{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-top:24px}.stats-header{background:#21262d;padding:10px 16px;font-size:13px;font-weight:600;border-bottom:1px solid #30363d}.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}.stat-item{padding:12px;text-align:center;border-bottom:1px solid #21262d}.stat-value{font-size:24px;font-weight:700;color:#58a6ff}.stat-label{font-size:11px;color:#8b949e;margin-top:4px}.settings{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:24px;display:none}.settings .row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}.settings label{font-size:13px;color:#8b949e;min-width:80px}.settings input[type=number]{width:80px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:6px 10px;border-radius:4px;font-size:13px}.notification-permission{font-size:12px;color:#d29922;margin-top:8px}</style></head><body><header><h1>🍅 Pomodoro Timer</h1><div class="lang-switch"><button class="active" onclick="setLang("zh")">中文</button><button onclick="setLang("en")">EN</button></div></header><div class="container"><div class="mode-tabs"><button class="mode-tab active" onclick="setMode("focus")">🍅 专注</button><button class="mode-tab" onclick="setMode("break")">☕ 短休息</button><button class="mode-tab" onclick="setMode("longbreak")">🌴 长休息</button></div><div class="timer-circle focus" id="timerCircle"><div style="text-align:center"><div class="timer-text" id="timerDisplay">25:00</div><div class="timer-label" id="timerLabel">专注 / Focus</div></div></div><div class="session-counter" id="sessionCounter">今日番茄: 0 🍅</div><div class="controls"><button class="btn btn-start" id="startBtn" onclick="toggleTimer()">▶ 开始</button><button class="btn btn-reset" onclick="resetTimer()">↺ 重置</button></div><button class="btn" style="margin-bottom:16px;font-size:12px" onclick="toggleSettings()">⚙️ 设置</button><div class="settings" id="settings"><div class="row"><label>专注时长 (分)</label><input type="number" id="focusTime" value="25" min="1" max="120"></div><div class="row"><label>短休息 (分)</label><input type="number" id="breakTime" value="5" min="1" max="30"></div><div class="row"><label>长休息 (分)</label><input type="number" id="longBreakTime" value="15" min="1" max="60"></div><div class="row"><label>长休息间隔</label><input type="number" id="longBreakInterval" value="4" min="1" max="10"><span style="font-size:12px;color:#8b949e">个番茄后</span></div></div><div class="stats-card"><div class="stats-header">📊 今日统计</div><div class="stats-grid"><div class="stat-item"><div class="stat-value" id="todayPomodoros">0</div><div class="stat-label">番茄数</div></div><div class="stat-item"><div class="stat-value" id="todayMinutes">0</div><div class="stat-label">专注分钟</div></div><div class="stat-item"><div class="stat-value" id="todaySessions">0</div><div class="stat-label">完成次数</div></div><div class="stat-item"><div class="stat-value" id="streak">0</div><div class="stat-label">连续天数</div></div></div></div></div><audio id="alarmSound" preload="auto"><source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACAf39/f4B/f3+Af4CAgH9/f3+Af3+Af4B/gH+Af4B/gH+Af4B/gH+Af4B/gH+AgH9/f39/gH+Af4B/gH+Af4B/gH+Af4B/gH+Af4B/gH+Af4B/gH+Af4B/gH+Af39/f39/gH+Af4CAgH9/f39/gH+Af4B/gH+Af4B/gH+Af4B/gH+Af4B/gH+Af4CAgH9/f39/gH+Afw==" type="audio/wav"></audio><script>var lang="zh",timer=null,timeLeft=25*60,totalTime=25*60,mode="focus",running=false,sessions=0,todayStats={pomodoros:0,minutes:0,sessions:0};function setLang(l){lang=l;document.querySelectorAll(".lang-switch button").forEach(function(b,i){b.classList.toggle("active",(i===0&&l==="zh")||(i===1&&l==="en"))})}function loadStats(){var s=localStorage.getItem("pomodoro_stats");if(s)try{todayStats=JSON.parse(s)}catch(e){}var today=new Date().toDateString();var saved=localStorage.getItem("pomodoro_date");if(saved!==today){todayStats={pomodoros:0,minutes:0,sessions:0};saveStats()}updateStatsDisplay()}function saveStats(){localStorage.setItem("pomodoro_stats",JSON.stringify(todayStats));localStorage.setItem("pomodoro_date",new Date().toDateString())}function updateStatsDisplay(){document.getElementById("todayPomodoros").textContent=todayStats.pomodoros;document.getElementById("todayMinutes").textContent=todayStats.minutes;document.getElementById("todaySessions").textContent=todayStats.sessions;var streak=parseInt(localStorage.getItem("pomodoro_streak")||"0");document.getElementById("streak").textContent=streak;document.getElementById("sessionCounter").textContent="今日番茄: "+todayStats.pomodoros+" 🍅 | 第 "+(sessions+1)+" 轮"}function setMode(m){mode=m;var times={focus:parseInt(document.getElementById("focusTime").value)||25,break:parseInt(document.getElementById("breakTime").value)||5,longbreak:parseInt(document.getElementById("longBreakTime").value)||15};timeLeft=times[mode]*60;totalTime=timeLeft;running=false;clearInterval(timer);document.getElementById("startBtn").textContent="▶ 开始";document.getElementById("startBtn").className="btn btn-start";var circle=document.getElementById("timerCircle");circle.className="timer-circle "+mode;var labels={focus:"专注 / Focus",break:"短休息 / Break",longbreak:"长休息 / Long Break"};document.getElementById("timerLabel").textContent=labels[mode];document.querySelectorAll(".mode-tab").forEach(function(t){t.classList.toggle("active",t.textContent.includes(mode==="focus"?"专注":mode==="break"?"短休息":"长休息"))});updateDisplay()}function updateDisplay(){var m=Math.floor(timeLeft/60);var s=timeLeft%60;document.getElementById("timerDisplay").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");document.title="("+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+") Pomodoro"}function toggleTimer(){if(running){pauseTimer()}else{startTimer()}}function startTimer(){running=true;document.getElementById("startBtn").textContent="⏸ 暂停";document.getElementById("startBtn").className="btn btn-pause";if(Notification.permission==="default")Notification.requestPermission();timer=setInterval(function(){timeLeft--;updateDisplay();if(timeLeft<=0){clearInterval(timer);running=false;document.getElementById("startBtn").textContent="▶ 开始";document.getElementById("startBtn").className="btn btn-start";try{document.getElementById("alarmSound").play()}catch(e){}if(Notification.permission==="granted")new Notification("🍅 番茄钟",{body:mode==="focus"?"专注时间结束！休息一下吧":"休息时间结束！开始新的番茄吧"});if(mode==="focus"){sessions++;todayStats.pomodoros++;todayStats.minutes+=Math.round(totalTime/60);todayStats.sessions++;var interval=parseInt(document.getElementById("longBreakInterval").value)||4;if(sessions%interval===0)setMode("longbreak");else setMode("break");saveStats();updateStatsDisplay()}else{setMode("focus");updateStatsDisplay()}}},1000)}function pauseTimer(){running=false;clearInterval(timer);document.getElementById("startBtn").textContent="▶ 继续";document.getElementById("startBtn").className="btn btn-start"}function resetTimer(){running=false;clearInterval(timer);var times={focus:parseInt(document.getElementById("focusTime").value)||25,break:parseInt(document.getElementById("breakTime").value)||5,longbreak:parseInt(document.getElementById("longBreakTime").value)||15};timeLeft=times[mode]*60;totalTime=timeLeft;document.getElementById("startBtn").textContent="▶ 开始";document.getElementById("startBtn").className="btn btn-start";updateDisplay()}function toggleSettings(){var s=document.getElementById("settings");s.style.display=s.style.display==="none"?"block":"none"}loadStats();updateDisplay();</script></body></html>
